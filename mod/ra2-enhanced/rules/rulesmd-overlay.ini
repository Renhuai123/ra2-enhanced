; =============================================================================
; RA2 Enhanced — rulesmd overlay (Enhanced AI v0 + safe QoL hooks)
; Target: Yuri's Revenge + Ares + Phobos
; No unit damage/cost rebalance. Focus: AI pacing + Phobos target lists.
;
; Difficulty value order for TeamDelays / AIHateDelays / TotalAITeamCap:
;   Hard(Brutal), Normal, Easy
; =============================================================================

[General]
; Snappier AI team production checks (vanilla often feels sluggish).
; Start mild — tune after fixed-map A/B on a real YR install.
TeamDelays=80,120,180

; Choose an enemy sooner in multiplayer/skirmish.
AIHateDelays=20,40,80

; Allow more concurrent AI teams on harder slots without income cheats.
; (Avoid MultiplayerAICM / AIVirtualPurifiers as Enhanced defaults.)
TotalAITeamCap=30,22,16

; Keep defensive-team floors conservative — raising MinimumAIDefensiveTeams
; too high can stall Soviet AI if base-defense TeamTypes are scarce.
; Prefer our IsBaseDefense AA TeamTypes + triggers instead of cranking these.
; MinimumAIDefensiveTeams=1,1,1
; MaximumAIDefensiveTeams=3,2,1

; =============================================================================
; Phobos AITargetTypes — indices referenced by aimd script actions 10002+
; 0 = production / economy buildings to raid
; 1 = air threats / AA-relevant targets
; =============================================================================

[AITargetTypes]
0=GAPOWR,GAREFN,GAWEAP,GAPILE,NAPOWR,NAREFN,NAWEAP,NAHAND,YAPOWR,YAREFN,YAWEAP,YABRCK
1=ORCA,BEAG,DISK,ZEP,ASW,HORV,JUMPJET

; Optional Phobos dynamic delays (ignored if unsupported).
; TeamDelays.DynamicType=enemies
; TeamDelays.Count1=100,140,200
; TeamDelays.Count2=80,120,180
; TeamDelays.Count3=60,100,160
