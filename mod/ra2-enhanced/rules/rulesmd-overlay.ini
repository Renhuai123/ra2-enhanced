[General]
; Slightly snappier AI build pacing vs sluggish stock defaults.
; Values are starting points for A/B testing — tune in milestone AI v0.
; (Vanilla baselines vary by patch; always verify in your install.)

; --- AI macro helpers (vanilla-compatible keys; tune in testing) ---

[AI]
; Shorter delay before AI starts hating / prioritizing enemies aggressively.
; Lower = earlier pressure. Start mild to avoid broken early all-ins.
AIHateDelays=30,20,10

; Prefer keeping more defensive teams alive on harder slots.
MinimumAIDefensiveTeams=1,1,2
MaximumAIDefensiveTeams=2,3,4

; Encourage more attack groups on harder difficulties (index: Easy,Normal,Brutal).
MinimumAIAttackTeams=1,1,2
MaximumAIAttackTeams=2,3,4

; Harvesters — reduce “AI starves itself” feel without cheat income.
MaximumAIBaseSize=0,0,0
; NOTE: MaximumAIBaseSize 0 often means unlimited in Westwood AI; leave as-is
; unless your local rules.md documents otherwise. Prefer TeamType economy scripts.

