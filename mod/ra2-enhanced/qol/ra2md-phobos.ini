; =============================================================================
; RA2 Enhanced — RA2MD.INI [Phobos] user-toggle template
;
; This is NOT a full RA2MD.INI. Copy the [Phobos] keys below into the
; RA2MD.INI that lives next to gamemd.exe (Wine/CrossOver prefix on Mac).
; Players can flip these without editing mod rules.
; =============================================================================

[Phobos]
; Extended tooltip descriptions (requires uimd ExtendedToolTips=true).
ToolTipDescriptions=true

; Sidebar counters (requires matching uimd Sidebar.*.Show=true).
ShowHarvesterCounter=true
ShowPowerDelta=true

; Placement preview ghost while laying buildings.
ShowPlacementPreview=yes

; Designator / inhibitor range circles in SW targeting.
ShowDesignatorRange=true

; Optional: digital HP/ammo displays need DigitalDisplayTypes assets — leave off
; until you ship shapes/fonts from Phobos supplementaries.
DigitalDisplay.Enable=false
