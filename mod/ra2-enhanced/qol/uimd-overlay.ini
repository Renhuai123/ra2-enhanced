; =============================================================================
; RA2 Enhanced — uimd.ini overlay (Phobos UI QoL)
; Merge into / #include from your active uimd.ini.
; Player can still toggle several features via RA2MD.INI [Phobos] keys
; (see qol/ra2md-phobos.ini).
; =============================================================================

[ToolTips]
; Extended cameo tooltips: name / cost / power / build time / description.
ExtendedToolTips=true
AnchoredToolTips=true
MaxWidth=300

[Sidebar]
; Active/total harvester counter near credits.
HarvesterCounter.Show=true
HarvesterCounter.ConditionYellow=99%
HarvesterCounter.ConditionRed=50%

; Power surplus / deficit counter (low-power clarity).
PowerDelta.Show=true
PowerDelta.ConditionYellow=75%
PowerDelta.ConditionRed=100%
