; Comparator "enemy owns >= 1 OBJECT":
;   0,OBJECT,0100000003000000000000000000000000000000000000000000000000000000
;
; Append AFTER base aimd.ini AITriggerTypes. IDs use RA2E_TRIG_ prefix.
; =============================================================================

