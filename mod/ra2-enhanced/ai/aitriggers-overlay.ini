; ID=Name,Team1,OwnerHouse,TechLevel,ConditionType,ConditionObject,Comparator,
;    StartingWeight,MinimumWeight,MaximumWeight,IsForSkirmish,unused,Side,
;    IsBaseDefense,Team2,EnabledInE,EnabledInM,EnabledInH
