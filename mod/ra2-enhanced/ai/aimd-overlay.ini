; =============================================================================
; RA2 Enhanced — aimd overlay (Enhanced AI v0)
; Target: Yuri's Revenge + Ares + Phobos
;
; How to use:
;   Append/include AFTER your base aimd.ini (never replace vanilla wholesale).
;   Register teams via ai/aitriggers-overlay.ini so houses actually build them.
;
; Naming: RA2E_ prefix avoids colliding with stock TeamType IDs.
; Script actions 10000+ require Phobos. Vanilla-only fallbacks are noted.
; Difficulty tiers are selected via AITriggerTypes EnabledInE/M/H flags.
; =============================================================================

; --- TaskForces --------------------------------------------------------------

