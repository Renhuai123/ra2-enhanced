; --- ScriptTypes -------------------------------------------------------------
; Phobos generic quarry indices (action 10000):
;   3=Ore Miners  9=Power Plants  12=Refinery  18=Economy
; Phobos AITargetTypes attack (action 10002): second arg = rules [AITargetTypes] index
; Action 5 = Jump to line (loop). Action 49 = vanilla "success" marker used by weight logic.

[ScriptTypes]
0=RA2E_Script_GatherAttack
1=RA2E_Script_HarassEco
2=RA2E_Script_StrikePower
3=RA2E_Script_AntiAirHunt
4=RA2E_Script_RaidProduction

[RA2E_Script_GatherAttack]
Name=RA2E gather and attack structures
0=10000,12
1=10000,9
2=0,1
3=5,0

[RA2E_Script_HarassEco]
Name=RA2E harass economy loop
0=10000,18
1=10000,3
2=5,0

[RA2E_Script_StrikePower]
Name=RA2E strike power then production
0=10000,9
1=10002,0
2=5,0

[RA2E_Script_AntiAirHunt]
Name=RA2E anti-air hunt
; Target Type 2 = enemy aircraft (vanilla Attack Target Type)
0=0,2
1=10002,1
2=5,0

[RA2E_Script_RaidProduction]
Name=RA2E raid factories / refineries
0=10002,0
1=10000,12
2=5,0

